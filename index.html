      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        const btn = document.getElementById('theme-toggle');
        btn.textContent = theme === 'light' ? '☾' : '☀';
        const meta = document.querySelector('meta[name="theme-color"]');

        btn.addEventListener('click', function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'light' ? '☾' : '☀';
          if (meta) meta.setAttribute('content', next === 'light' ? '#f5f5f0' : '#0d0d0d');
        });

    <!-- ClickSpark Component -->
    <script type="text/babel">
      const { useRef, useEffect, useCallback, useState, useMemo } = React;

      const ClickSpark = ({
        sparkColor = "#ff0080",
        sparkSize = 10,
        sparkRadius = 15,
        sparkCount = 8,
        duration = 400,
        easing = "ease-out",
        extraScale = 1.0
      }) => {
        const canvasRef = useRef(null);
        const sparksRef = useRef([]);

        const easeFunc = useCallback((t) => {
          switch (easing) {
            case "linear": return t;
            case "ease-in": return t * t;
            case "ease-in-out": return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
            default: return t * (2 - t);
          }
        }, [easing]);

        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");

          const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          };

          resize();
          window.addEventListener("resize", resize);

          let animationId;
          const draw = (ts) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            sparksRef.current = sparksRef.current.filter((spark) => {
              const elapsed = ts - spark.startTime;
              if (elapsed > duration) return false;
              const progress = easeFunc(elapsed / duration);
              const d = progress * sparkRadius * extraScale;
              const l = sparkSize * (1 - progress);
              const x1 = spark.x + d * Math.cos(spark.angle);
              const y1 = spark.y + d * Math.sin(spark.angle);
              const x2 = spark.x + (d + l) * Math.cos(spark.angle);
              const y2 = spark.y + (d + l) * Math.sin(spark.angle);
              ctx.strokeStyle = sparkColor;
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
              ctx.stroke();
              return true;
            });
            animationId = requestAnimationFrame(draw);
          };
          animationId = requestAnimationFrame(draw);

          return () => {
            window.removeEventListener("resize", resize);
            cancelAnimationFrame(animationId);
          };
        }, [sparkColor, sparkSize, sparkRadius, duration, easeFunc, extraScale]);

        useEffect(() => {
          const onClick = (e) => {
            const canvas = canvasRef.current;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const time = performance.now();
            sparksRef.current.push(
              ...Array.from({ length: sparkCount }, (_, i) => ({
                x, y,
                angle: (2 * Math.PI * i) / sparkCount,
                startTime: time
              }))
            );
          };
          window.addEventListener("click", onClick);
          return () => window.removeEventListener("click", onClick);
        }, [sparkCount]);

        return (
          <canvas
            ref={canvasRef}
            style={{
              position: "fixed",
              top: 0, left: 0,
              width: "100%",
              height: "100%",
              pointerEvents: "none",
              zIndex: 9999
            }}
          />
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("spark-root"));
      root.render(<ClickSpark />);


const ANIMATION_CONFIG = {
  SMOOTH_TAU: 0.25,
  MIN_COPIES: 2,
  COPY_HEADROOM: 2
};

const toCssLength = (value) =>
  typeof value === 'number' ? `${value}px` : (value ?? undefined);

const cx = (...parts) => parts.filter(Boolean).join(' ');

const useResizeObserver = (callback, elements, dependencies) => {
  useEffect(() => {
    if (!window.ResizeObserver) {
      const handleResize = () => callback();
      window.addEventListener('resize', handleResize);
      callback();
      return () => window.removeEventListener('resize', handleResize);
    }
    const observers = elements.map(ref => {
      if (!ref.current) return null;
      const observer = new ResizeObserver(callback);
      observer.observe(ref.current);
      return observer;
    });
    callback();
    return () => {
      observers.forEach(observer => observer?.disconnect());
    };
  }, dependencies);
};

const useImageLoader = (seqRef, onLoad, dependencies) => {
  useEffect(() => {
    const images = seqRef.current?.querySelectorAll('img') ?? [];
    if (images.length === 0) {
      onLoad();
      return;
    }
    let remainingImages = images.length;
    const handleImageLoad = () => {
      remainingImages -= 1;
      if (remainingImages === 0) {
        onLoad();
      }
    };
    images.forEach(img => {
      if (img.complete) {
        handleImageLoad();
      } else {
        img.addEventListener('load', handleImageLoad, { once: true });
        img.addEventListener('error', handleImageLoad, { once: true });
      }
    });
    return () => {
      images.forEach(img => {
        img.removeEventListener('load', handleImageLoad);
        img.removeEventListener('error', handleImageLoad);
      });
    };
  }, dependencies);
};

const useAnimationLoop = (
  trackRef, targetVelocity, seqWidth, seqHeight, isHovered, hoverSpeed, isVertical
) => {
  const rafRef = useRef(null);
  const lastTimestampRef = useRef(null);
  const offsetRef = useRef(0);
  const velocityRef = useRef(0);

  useEffect(() => {
    const track = trackRef.current;
    if (!track) return;
    const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const seqSize = isVertical ? seqHeight : seqWidth;

    if (seqSize > 0) {
      offsetRef.current = ((offsetRef.current % seqSize) + seqSize) % seqSize;
      const transformValue = isVertical
        ? `translate3d(0, ${-offsetRef.current}px, 0)`
        : `translate3d(${-offsetRef.current}px, 0, 0)`;
      track.style.transform = transformValue;
    }

    if (prefersReduced) {
      track.style.transform = isVertical ? 'translate3d(0, 0, 0)' : 'translate3d(0, 0, 0)';
      return () => { lastTimestampRef.current = null; };
    }

    const animate = (timestamp) => {
      if (lastTimestampRef.current === null) lastTimestampRef.current = timestamp;
      const deltaTime = Math.max(0, timestamp - lastTimestampRef.current) / 1000;
      lastTimestampRef.current = timestamp;

      const target = isHovered && hoverSpeed !== undefined ? hoverSpeed : targetVelocity;
      const easingFactor = 1 - Math.exp(-deltaTime / ANIMATION_CONFIG.SMOOTH_TAU);
      velocityRef.current += (target - velocityRef.current) * easingFactor;

      if (seqSize > 0) {
        let nextOffset = offsetRef.current + velocityRef.current * deltaTime;
        nextOffset = ((nextOffset % seqSize) + seqSize) % seqSize;
        offsetRef.current = nextOffset;
        const transformValue = isVertical
          ? `translate3d(0, ${-offsetRef.current}px, 0)`
          : `translate3d(${-offsetRef.current}px, 0, 0)`;
        track.style.transform = transformValue;
      }
      rafRef.current = requestAnimationFrame(animate);
    };

    rafRef.current = requestAnimationFrame(animate);
    return () => {
      if (rafRef.current !== null) {
        cancelAnimationFrame(rafRef.current);
        rafRef.current = null;
      }
      lastTimestampRef.current = null;
    };
  }, [targetVelocity, seqWidth, seqHeight, isHovered, hoverSpeed, isVertical]);
};

const LogoLoop = React.memo(({
  logos, speed = 80, direction = 'left', width = '100%', logoHeight = 28, gap = 32, scaleOnHover = false, className, style
}) => {
  const isReverse = direction === 'right';
  const duration = (10000 / speed).toFixed(2);
  
  const rootClasses = cx('logoloop-root', className, scaleOnHover && 'logoloop-hoverable');
  
  const trackStyle = {
    animationDuration: `${duration}s`,
    animationDirection: isReverse ? 'reverse' : 'normal',
    gap: `${gap}px`,
    '--logoloop-gap': `${gap}px`
  };

  const renderItems = () =>
    logos.map((item, idx) => (
      <li className={cx('logoloop-item', 'horizontal')} key={idx} role="listitem">
        <img className={cx('logoloop-content', 'logoloop-img')} src={item.src} alt={item.alt || item.title || ''} style={{ height: logoHeight }} draggable={false} />
        {item.title && <span className="logoloop-title">{item.title}</span>}
      </li>
    ));

  return (
    <div className={rootClasses} style={{ width, ...style }} role="region">
      <div className="logoloop-fade fade-left" aria-hidden />
      <div className="logoloop-fade fade-right" aria-hidden />
      <div className="logoloop-track horizontal logoloop-css-marquee" style={trackStyle}>
        <ul className="logoloop-list">{renderItems()}</ul>
        <ul className="logoloop-list" aria-hidden>{renderItems()}</ul>
        <ul className="logoloop-list" aria-hidden>{renderItems()}</ul>
      </div>
    </div>
  );
});
